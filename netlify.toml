# ── Companion Mobile (mobile app endpoints) ───────────────────────────────────
[[redirects]]
  from = "/api/companion-pair"
  to = "/.netlify/functions/companion-pair"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-ingest"
  to = "/.netlify/functions/companion-ingest"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-refresh"
  to = "/.netlify/functions/companion-refresh"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-billing-extract"
  to = "/.netlify/functions/companion-billing-extract"
  status = 200

[[redirects]]
  from = "/api/companion-care-plan-current"
  to = "/.netlify/functions/companion-care-plan-current"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-log-day"
  to = "/.netlify/functions/companion-log-day"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-invoice-mark-payment"
  to = "/.netlify/functions/companion-invoice-mark-payment"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-invoice-approve-payment"
  to = "/.netlify/functions/companion-invoice-approve-payment"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
