[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/companion-ai"
  to = "/.netlify/functions/companion-ai"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-connect"
  to = "/.netlify/functions/companion-connect"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-oauth-callback"
  to = "/.netlify/functions/companion-oauth-callback"
  status = 200
  force = true

[[redirects]]
  from = "/api/companion-sync"
  to = "/.netlify/functions/companion-sync"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
